<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQ Mesh Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🚨 RESQ MESH MONITORING HUB</h1>

        <div class="card"><h3>Alert</h3><p id="alert">--</p></div>
        <div class="card"><h3>Latitude</h3><p id="lat">--</p></div>
        <div class="card"><h3>Longitude</h3><p id="lon">--</p></div>
        <div class="card"><h3>Satellites</h3><p id="sat">--</p></div>
        <div class="card"><h3>Gas</h3><p id="gas">--</p></div>
        <div class="card"><h3>Water</h3><p id="water">--</p></div>
        <div class="card"><h3>Vibration</h3><p id="quake">--</p></div>
        <div class="card"><h3>Token</h3><p id="node">--</p></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
