<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESQ MESH Monitoring Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🚨 RESQ MESH DISASTER COMMUNICATION HUB 🚨</h1>

    <div id="sosBanner" class="sos-banner">
        🚨 EMERGENCY ALERT RECEIVED 🚨
    </div>

    <div class="grid-container">

        <div class="card">
            <h3>Alert</h3>
            <p id="alert">--</p>
        </div>

        <div class="card">
            <h3>Latitude</h3>
            <p id="lat">--</p>
        </div>

        <div class="card">
            <h3>Longitude</h3>
            <p id="lon">--</p>
        </div>

        <div class="card">
            <h3>Satellites</h3>
            <p id="sat">--</p>
        </div>

        <div class="card">
            <h3>Gas Level</h3>
            <p id="gas">--</p>
        </div>

        <div class="card">
            <h3>Water Level</h3>
            <p id="water">--</p>
        </div>

        <div class="card">
            <h3>Message / Signal</h3>
            <p id="messageSignal">--</p>
        </div>

        <div class="card">
            <h3>Earthquake Level</h3>
            <p id="quakeLevel">--</p>
        </div>

        <div class="card">
            <h3>System Status</h3>
            <p id="status">CONNECTING...</p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
