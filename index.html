<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQ Mesh Command Center</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b111e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin-top: 20px;
            font-size: 2.5rem;
            text-align: center;
        }
        .subtitle {
            color: #8a99ad;
            margin-bottom: 40px;
            text-align: center;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .card {
            background-color: #161f30;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
        }
        .card h3 {
            margin: 0 0 15px 0;
            color: #3b82f6;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card p {
            margin: 0;
            font-size: 1.8rem;
            font-weight: bold;
            color: #e2e8f0;
        }
    </style>
</head>
<body>

    <h1>🚨 RESQ MESH COMMAND CENTER</h1>
    <div class="subtitle">Worldwide Disaster Monitoring Dashboard</div>

    <div class="grid-container">
        <div class="card">
            <h3>Alert Type</h3>
            <p id="alert">Loading...</p>
        </div>
        <div class="card">
            <h3>Latitude</h3>
            <p id="lat">--</p>
        </div>
        <div class="card">
            <h3>Longitude</h3>
            <p id="lon">--</p>
        </div>
        <div class="card">
            <h3>Satellites</h3>
            <p id="sat">--</p>
        </div>
        <div class="card">
            <h3>Gas Value</h3>
            <p id="gas">--</p>
        </div>
        <div class="card">
            <h3>Water Level</h3>
            <p id="water">--</p>
        </div>
        <div class="card">
            <h3>Vibration (MPU6050)</h3>
            <p id="quake">--</p>
        </div>
        <div class="card">
            <h3>Message Tracking Log</h3>
            <p id="node" style="font-size: 1.2rem; white-space: nowrap;">--</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
