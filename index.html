<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RESQ MESH Dashboard</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🚨 RESQ MESH COMMAND CENTER</h1>
<p>Worldwide Disaster Monitoring Dashboard</p>
</header>

<div class="grid">

<div class="card">
<h2>Alert Type</h2>
<h1 id="alert">Loading...</h1>
</div>

<div class="card">
<h2>Latitude</h2>
<h3 id="lat">--</h3>
</div>

<div class="card">
<h2>Longitude</h2>
<h3 id="lon">--</h3>
</div>

<div class="card">
<h2>Satellites</h2>
<h3 id="sat">--</h3>
</div>

<div class="card">
<h2>Gas Value</h2>
<h3 id="gas">--</h3>
</div>

<div class="card">
<h2>Water Level</h2>
<h3 id="water">--</h3>
</div>

<div class="card">
<h2>Earthquake</h2>
<h3 id="quake">--</h3>
</div>

<div class="card">
<h2>Node ID</h2>
<h3 id="node">--</h3>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
