<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQ Mesh Command Center</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b111e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin-top: 20px;
            font-size: 2.2rem;
            text-align: center;
            color: #f1f5f9;
        }
        .subtitle {
            color: #8a99ad;
            margin-bottom: 40px;
            text-align: center;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .card {
            background-color: #161f30;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            border: 1px solid #1e293b;
        }
        .card h3 {
            margin: 0 0 15px 0;
            color: #3b82f6;
            font-size: 0.95rem;
            text-transform: uppercase;
        }
        .card p {
            margin: 0;
            font-size: 1.6rem;
            font-weight: bold;
            color: #e2e8f0;
        }
    </style>
</head>
<body>

    <h1>🚨 RESQ MESH MONITORING HUB</h1>
    <div class="subtitle">Real-Time Field Telemetry Dashboard</div>

    <div class="grid-container">
        <div class="card">
            <h3>Alert Status</h3>
            <p id="alert">Syncing...</p>
        </div>
        <div class="card">
            <h3>Latitude</h3>
            <p id="lat">--</p>
        </div>
        <div class="card">
            <h3>Longitude</h3>
            <p id="lon">--</p>
        </div>
        <div class="card">
            <h3>Satellites</h3>
            <p id="sat">--</p>
        </div>
        <div class="card">
            <h3>Gas Value</h3>
            <p id="gas">--</p>
        </div>
        <div class="card">
            <h3>Water Level</h3>
            <p id="water">--</p>
        </div>
        <div class="card">
            <h3>Vibration (MPU6050)</h3>
            <p id="quake">--</p>
        </div>
        <div class="card">
            <h3>Message Token Log</h3>
            <p id="node" style="font-size: 1.15rem; color: #38bdf8;">--</p>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                // FIXED SECURE ENDPOINT: Uses /feeds/last.json for private queries using your verified key
                const liveURL = "https://api.thingspeak.com/channels/3398357/feeds/last.json?api_key=9WWD5Y74FM6LVWCH&nocache=" + new Date().getTime();
                
                const response = await fetch(liveURL);
                
                if (!response.ok) {
                    console.error("ThingSpeak Server rejected request with Status:", response.status);
                    if (document.getElementById("alert")) {
                        document.getElementById("alert").innerText = "Auth Error (" + response.status + ")";
                    }
                    return;
                }

                // Note: /feeds/last.json returns the feed object directly, NOT inside a "feeds" array!
                const feed = await response.json();
                
                if (!feed || Object.keys(feed).length === 0) {
                    console.log("Connected to channel, but the last feed entry is empty.");
                    return;
                }
                
                console.log("Private Telemetry Authenticated & Received:", feed);

                // 1. Alert Status Mapping
                if (document.getElementById("alert")) {
                    let statusText = "Pending";
                    if (feed.field1 === "1") statusText = "🚨 HELP";
                    else if (feed.field1 === "2") statusText = "✅ SAFE";
                    else if (feed.field1 === "3") statusText = "🩺 MEDICAL";
                    else if (feed.field1 === "4") statusText = "⚠️ SENSOR ALARM";
                    else if (feed.field1) statusText = feed.field1; 
                    document.getElementById("alert").innerText = statusText;
                }

                // 2. GPS Positioning Cards
                if (document.getElementById("lat")) document.getElementById("lat").innerText = feed.field2 || "0.000000";
                if (document.getElementById("lon")) document.getElementById("lon").innerText = feed.field3 || "0.000000";
                if (document.getElementById("sat")) document.getElementById("sat").innerText = feed.field4 || "0";

                // 3. Environmental Gas Sensors
                if (document.getElementById("gas")) {
                    if (feed.field5) {
                        document.getElementById("gas").innerText = isNaN(feed.field5) ? feed.field5 : feed.field5 + " ppm";
                    } else {
                        document.getElementById("gas").innerText = "0 ppm";
                    }
                }

                // 4. Flood Water Level Sensors
                if (document.getElementById("water")) {
                    document.getElementById("water").innerText = feed.field6 ? feed.field6 + " cm" : "0 cm";
                }

                // 5. Vibration Sensors (Field 7)
                if (document.getElementById("quake")) {
                    if (feed.field7 && !isNaN(feed.field7)) {
                        let vib = parseFloat(feed.field7);
                        if (vib > 12.0 || vib < 7.0) {
                            document.getElementById("quake").innerText = vib.toFixed(1) + " m/s² [SHAKE]";
                        } else {
                            document.getElementById("quake").innerText = vib.toFixed(1) + " m/s² [STABLE]";
                        }
                    } else {
                        document.getElementById("quake").innerText = feed.field7 || "0.0 m/s²";
                    }
                }

                // 6. Message Token Log Tracker (Field 8)
                if (document.getElementById("node")) {
                    if (feed.created_at) {
                        const localTime = new Date(feed.created_at).toLocaleTimeString('en-IN', {
                            hour: '2-digit', minute: '2-digit', second: '2-digit'
                        });
                        if (feed.field8) {
                            document.getElementById("node").innerText = `#${feed.field8} @ ${localTime}`;
                        } else {
                            document.getElementById("node").innerText = `Live @ ${localTime}`;
                        }
                    } else {
                        document.getElementById("node").innerText = feed.field8 || "--";
                    }
                }

            } catch (error) {
                console.error("Dashboard engine catch block caught an error:", error);
            }
        }

        // Run instantly on webpage layout load
        loadData();
        // Check for hardware packet streams every 5 seconds
        setInterval(loadData, 5000);
    </script>
</body>
</html>
